name: Repro rerun same SHA

on:
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - name: Check for repro marker comment
        id: marker
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MARKER: "<!-- rerun-same-sha-repro -->"
        run: |
          if gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Seed marker and fail on first attempt
        if: steps.marker.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MARKER: "<!-- rerun-same-sha-repro -->"
        run: |
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            -f "body=$MARKER First workflow attempt intentionally failed. Re-run this workflow on the same SHA to reproduce stale check handling."
          exit 1

      - name: Pass on rerun
        if: steps.marker.outputs.exists == 'true'
        run: echo "Marker exists; rerun on the same SHA succeeded."
